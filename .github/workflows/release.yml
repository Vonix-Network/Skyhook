name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: ""
            artifact_glob: "src-tauri/target/release/bundle/{deb,appimage,rpm}/*"
          - os: macos-14
            target: "universal-apple-darwin"
            artifact_glob: "src-tauri/target/universal-apple-darwin/release/bundle/{dmg,macos}/*"
          - os: windows-latest
            target: ""
            artifact_glob: "src-tauri/target/release/bundle/{msi,nsis}/*"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            file build-essential

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build (Linux/Windows)
        if: matrix.target == ''
        run: pnpm tauri build

      - name: Build (macOS universal)
        if: matrix.target == 'universal-apple-darwin'
        run: pnpm tauri build --target universal-apple-darwin

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Skyhook ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ matrix.artifact_glob }}
